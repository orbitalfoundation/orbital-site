# The orbital site as containers: mongo + the node app. The PARENT folder
# (this repo and its engine siblings) is bind-mounted — no image builds; a
# deploy is git pull + npm install + restart. exe.dev proxies
# https://<vm>.exe.xyz to port 8000.
services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  app:
    image: node:24-bookworm-slim
    restart: unless-stopped
    working_dir: /work/orbital-site
    command: node --preserve-symlinks ../orbital-server/bin/orbital-server.js --port 8000
    environment:
      - MONGO_URL=mongodb://mongo:27017
    volumes:
      - ..:/work
    ports:
      - "8000:8000"
    depends_on:
      - mongo

volumes:
  mongo-data:
